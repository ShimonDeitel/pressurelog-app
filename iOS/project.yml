name: Pressurelog
options:
  bundleIdPrefix: com.shimondeitel.pressurecook
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Pressurelog:
    type: application
    platform: iOS
    sources:
      - path: Pressurelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pressurecook
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Pressurelog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PressurelogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PressurelogTests
      - path: Pressurelog.storekit
    dependencies:
      - target: Pressurelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pressurecook.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PressurelogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PressurelogUITests
    dependencies:
      - target: Pressurelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pressurecook.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Pressurelog:
    build:
      targets:
        Pressurelog: all
        PressurelogTests: [test]
        PressurelogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Pressurelog.storekit
    test:
      config: Debug
      storeKitConfiguration: Pressurelog.storekit
      targets:
        - PressurelogTests
        - PressurelogUITests
    archive:
      config: Release
